  # Re-validated with HERMeS and NEXT data
  - id: "val-006"
    slug: "hall-thruster-lifetime"
    claim: "Hall thrusters can achieve 50,000+ hours of operational lifetime"
    bomItemId: "bom-0-5"
    questionId: "rq-0-20"
    status: "validated"
    validations:
      - id: "val-006-1"
        date: "2024-06-15"
        source: "mission-data"
        sourceDetails: "Dawn mission post-flight analysis - 48,000 hours achieved"
        conclusion: "Dawn ion thrusters exceeded design life, achieving 48,000 hours; supports 50,000 hour target"
        confidence: 85
        relatedRQs:
          - "rq-0-20"
        validator: "Propulsion Team"
        notes: "Based on Dawn gridded ion thrusters; Hall thruster data from Starlink may update this"
      - id: "val-006-2"
        date: "2025-03-10"
        source: "literature"
        sourceDetails: "New research suggests erosion models underestimate wear at high power levels"
        conclusion: "Recent papers indicate 50,000 hour lifetime may require design modifications for high-power (>10kW) Hall thrusters"
        confidence: 60
        relatedRQs:
          - "rq-0-20"
        validator: "Literature Review Team"
        notes: "Marked as outdated pending Starlink operational data release"
      - id: "val-006-3"
        date: "2026-03-17"
        source: "literature"
        sourceDetails: "Arxiv literature review for rq-0-16: magnetically shielded Hall thruster PIC simulations (arxiv:2304.06563) and BN erosion diagnostics (arxiv:1005.0592)"
        conclusion: "Magnetically shielded Hall thruster designs reduce channel wall erosion by 2-3 orders of magnitude, potentially enabling 50,000+ hour lifetimes at high power. However, long-duration validation data (>5,000 hours) for magnetically shielded designs is in AIAA/IEPC literature, not yet obtained. Cathode lifetime may become the new limiting factor."
        confidence: 55
        relatedRQs:
          - "rq-0-16"
          - "rq-0-20"
        validator: "Literature Review (arxiv)"
        notes: "Key non-arxiv data needed: HERMeS life test results (NASA GRC), H6MS thruster data (JPL). See publications/handover/rq-0-16-thruster-lifetime-isp-tradeoff-handover.md"
      - id: "val-006-4"
        date: "2026-03-18"
        source: "literature"
        sourceDetails: "External literature search obtained HERMeS wear test series (AIAA-2019-3895, AIAA-2018-4645, AIAA-2017-4647), magnetic shielding physics (Mikellides J.Appl.Phys. 2014), NSTAR 30,000h life test (AIAA-2003-4558), NEXT >50,000h ground test"
        conclusion: "Magnetically shielded Hall thrusters (HERMeS) demonstrated 3,570 hours with zero channel wall erosion. Inner front pole cover is the new life limiter (not walls). NEXT ion thruster exceeded 50,000 hours in ground testing. 50,000+ hour Hall thruster lifetime is credible with magnetic shielding, supported by AEPS/Gateway flight program at TRL 8-9."
        confidence: 80
        relatedRQs:
          - "rq-0-16"
          - "rq-0-20"
        validator: "Literature Review (external + arxiv)"
        notes: "HERMeS 3,570h test data, Mikellides shielding physics, NSTAR/NEXT comparative data. See updated handover at publications/handover/rq-0-16-thruster-lifetime-isp-tradeoff-handover.md"
    lastUpdated: "2026-03-18"
    phaseId: "phase-0"
    tags:
      - "hall-thruster"
      - "lifetime"
      - "propulsion"
      - "ion-propulsion"
