# Arxiv papers relevant to rq-0-16: Thruster lifetime vs Isp tradeoff
# Generated: 2026-03-17
# Note: Hall/ion thruster engineering is primarily published through AIAA, IEPC, and
# Journal of Propulsion and Power. Arxiv has limited but relevant coverage.

papers:
  - arxiv_id: "2304.06563"
    title: "Reduced-order particle-in-cell simulations of a high-power magnetically shielded Hall thruster"
    authors: ["Maryam Reza", "Farbod Faraji", "Aaron Knoll"]
    relevance: critical
    summary: "Simulates plasma behavior in high-power magnetically shielded Hall thrusters using reduced-order PIC methods. Magnetically shielded designs dramatically reduce channel wall erosion, potentially extending thruster lifetime by 10x or more. Directly addresses the erosion-lifetime challenge central to rq-0-16."

  - arxiv_id: "1005.0592"
    title: "Development of a cavity ring-down spectroscopy sensor for boron nitride sputter erosion in Hall thrusters"
    authors: ["Lei Tao", "Naoji Yamamoto", "Alec D Gallimore"]
    relevance: critical
    summary: "Develops in-situ monitoring of BN sputtering from Hall thruster channel walls using CRDS. BN erosion is the primary lifetime-limiting mechanism in conventional Hall thrusters. Provides quantitative erosion rate measurement methodology essential for lifetime prediction."

  - arxiv_id: "0410170"
    title: "Plasma Diagnostic and Performance of a Permanent Magnet Hall Thruster"
    authors: ["Jose Leonardo Ferreira", "Joao Henrique Campos De Souza", "Israel Da Silveira Rego"]
    relevance: high
    summary: "Characterizes plasma diagnostics and performance of a permanent magnet Hall thruster. Permanent magnet designs simplify thruster architecture and may affect erosion patterns differently than electromagnetic coil designs. Provides baseline performance data for Hall thruster operation."

  - arxiv_id: "0310080"
    title: "Effect of Anode Dielectric Coating on Hall Thruster Operation"
    authors: ["L. Dorf", "Y. Raitses", "N. J. Fisch"]
    relevance: high
    summary: "Studies how dielectric coating on the anode affects Hall thruster operation, including anode fall voltage changes. Dielectric coatings form naturally during operation and affect performance and potentially lifetime. Relevant to understanding long-duration operational changes in Hall thrusters."

  - arxiv_id: "2509.26567"
    title: "AI-assisted Advanced Propellant Development for Electric Propulsion"
    authors: ["Angel Pan Du", "Miguel Arana-Catania", "Enric Grustan Gutiérrez"]
    relevance: medium
    summary: "Uses AI to predict performance of alternative propellants for electric propulsion, focusing on ionization and fragmentation patterns. Alternative propellants may offer different erosion characteristics and Isp tradeoffs compared to xenon, relevant to lifetime optimization."

key_findings:
  - "Magnetically shielded Hall thruster designs dramatically reduce channel wall erosion, the primary lifetime-limiting mechanism"
  - "Boron nitride sputtering from channel walls is measurable in-situ using optical spectroscopy techniques"
  - "Anode surface chemistry evolves during operation, affecting long-term performance characteristics"
  - "Alternative propellants to xenon are being explored, which may change the Isp-lifetime tradeoff landscape"

gaps_identified:
  - "Starlink Hall thruster operational data (largest fleet dataset) not publicly available"
  - "High-power (>20 kW) thruster lifetime scaling laws completely absent from arxiv"

